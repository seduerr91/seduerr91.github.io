<section class="archive-controls ai-controls" aria-label="Filter AI Daily updates">
  <div class="archive-search-row">
    <div class="archive-search">
      <label class="sr-only" for="ai-daily-search">Search AI Daily updates</label>
      <input id="ai-daily-search" data-archive-search type="search" class="form-control" placeholder="Search AI Daily">
      <span class="archive-search-symbol" aria-hidden="true">⌕</span>
    </div>
    <a class="btn btn-outline-primary" href="{{ '/feed/ai-daily.xml' | relative_url }}">RSS feed</a>
  </div>

  <div class="archive-filter-row" role="group" aria-label="AI Daily reading lenses">
    <button class="archive-filter is-active" type="button" data-archive-filter="all">All updates</button>
    <button class="archive-filter" type="button" data-archive-filter="agents">Agents &amp; workflows</button>
    <button class="archive-filter" type="button" data-archive-filter="evaluation">Evaluation &amp; safety</button>
    <button class="archive-filter" type="button" data-archive-filter="infrastructure">Models &amp; infrastructure</button>
  </div>

  <p class="archive-result-count" data-archive-count aria-live="polite"></p>
</section>

<script defer src="{{ '/assets/js/archive-filters.js' | relative_url }}"></script>
