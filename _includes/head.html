<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% seo %}

  <link rel="alternate" type="application/atom+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | absolute_url }}">
  {% if page.collection == "ai_daily" or page.url == "/ai-daily/" %}
  <link rel="alternate" type="application/atom+xml" title="{{ site.title | escape }} AI Daily" href="{{ '/feed/ai-daily.xml' | absolute_url }}">
  {% endif %}
  <link rel="shortcut icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}">

  <!-- Apply the saved theme before paint. -->
  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="{{ '/assets/vendor/bootstrap.min.css' | relative_url }}">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

</head>
