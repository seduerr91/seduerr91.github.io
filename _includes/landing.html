<div id="particles-js"></div>
<div class="row justify-content-center align-items-center p-4 landing-content">
  <div class="col-lg-8 col-md-10 text-center mt-4">
    <div class="landing-live-card wow animated slideInUp" data-wow-delay=".1s">
      <div class="landing-live-chip">
        <span class="landing-live-label">Seattle</span>
        <span id="clock-seattle" class="landing-live-value text-themed">Loading...</span>
      </div>
      <div class="landing-live-chip">
        <span class="landing-live-label">Frankfurt</span>
        <span id="clock-frankfurt" class="landing-live-value text-themed">Loading...</span>
      </div>
      <div class="landing-live-chip landing-live-chip-wide">
        <span class="landing-live-label">Issaquah Weather</span>
        <span id="weather-issaquah" class="landing-live-value text-themed">Loading weather...</span>
      </div>
    </div>

    <h1 class="landing-title text-themed wow animated slideInUp" data-wow-delay=".15s">{{ site.author.name }}</h1>
    <p class="landing-tagline text-themed wow animated slideInUp" data-wow-delay=".2s">{{ site.description }}</p>
  </div>
</div>
