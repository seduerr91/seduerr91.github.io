<nav class="social-links" aria-label="Social links">
  {% if site.author.github %}
    <a
      aria-label="GitHub"
      href="https://github.com/{{ site.author.github }}"
      rel="me noopener noreferrer"
      title="GitHub"
    >
      <img src="{{ '/assets/social/github.png' | relative_url }}" alt="" width="22" height="22">
    </a>
  {% endif %}
  {% if site.author.linkedin %}
    <a
      aria-label="LinkedIn"
      href="https://www.linkedin.com/in/{{ site.author.linkedin }}"
      rel="me noopener noreferrer"
      title="LinkedIn"
    >
      <img src="{{ '/assets/social/linkedin.png' | relative_url }}" alt="" width="22" height="22">
    </a>
  {% endif %}
  {% if site.author.medium %}
    <a
      aria-label="Medium"
      href="https://medium.com/@{{ site.author.medium }}"
      rel="me noopener noreferrer"
      title="Medium"
    >
      <img src="{{ '/assets/social/medium.png' | relative_url }}" alt="" width="22" height="22">
    </a>
  {% endif %}
  {% if site.author.kaggle %}
    <a
      aria-label="Kaggle"
      href="https://www.kaggle.com/{{ site.author.kaggle }}"
      rel="me noopener noreferrer"
      title="Kaggle"
    >
      <img src="{{ '/assets/social/kaggle.png' | relative_url }}" alt="" width="22" height="22">
    </a>
  {% endif %}
  {% if site.author.email %}
    <a aria-label="Email" href="mailto:{{ site.author.email }}" title="Email">
      <img src="{{ '/assets/social/email.png' | relative_url }}" alt="" width="22" height="22">
    </a>
  {% endif %}
</nav>
