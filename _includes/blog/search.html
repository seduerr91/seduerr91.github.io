<section class="archive-controls" aria-label="Filter blog posts">
  <div class="archive-search-row">
    <div class="archive-search">
      <label class="sr-only" for="blog-search">Search blog posts</label>
      <input id="blog-search" data-archive-search type="search" class="form-control" placeholder="Search titles, descriptions, or tags">
      <span class="archive-search-symbol" aria-hidden="true">⌕</span>
    </div>
    <a class="btn btn-outline-primary" href="{{ '/blog/tags' | relative_url }}">Browse tags</a>
  </div>

  <div class="archive-filter-row" role="group" aria-label="Blog topics">
    <button class="archive-filter is-active" type="button" data-archive-filter="all">All</button>
    <button class="archive-filter" type="button" data-archive-filter="ai-engineering">AI &amp; Engineering</button>
    <button class="archive-filter" type="button" data-archive-filter="running-pnw">Running &amp; PNW</button>
    <button class="archive-filter" type="button" data-archive-filter="travel">Travel</button>
    <button class="archive-filter" type="button" data-archive-filter="food">Food</button>
    <button class="archive-filter" type="button" data-archive-filter="personal">Personal</button>
  </div>

  <p class="archive-result-count" data-archive-count aria-live="polite"></p>
</section>

<script defer src="{{ '/assets/js/archive-filters.js' | relative_url }}"></script>
